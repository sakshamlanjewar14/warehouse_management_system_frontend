<div class="fixed bottom-5 right-5 z-50 flex flex-col gap-3">
    @for (toast of toastService.toasts(); track toast.id) {
    <div [class]="'flex items-center p-4 rounded-lg shadow-lg text-white min-w-64 transition-all animate-fade-in ' + 
                    (toast.type === 'success' ? 'bg-green-600' : 
                     toast.type === 'error' ? 'bg-red-600' : 'bg-blue-600')">
        <span class="flex-1">{{ toast.message }}</span>
        <button (click)="toastService.remove(toast.id)" class="ml-4 font-bold text-lg leading-none">&times;</button>
    </div>
    }
</div>
