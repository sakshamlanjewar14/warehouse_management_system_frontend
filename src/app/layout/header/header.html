<header class="h-16 bg-white/95 backdrop-blur-md border-b border-gray-200 flex items-center justify-between px-6 sticky top-0 z-20">
  <div class="flex items-center gap-4">
    <button 
      class="p-2 hover:bg-gray-100 rounded-lg text-gray-600 transition-colors"
      (click)="onToggleSidebar()">
      <span class="material-icons">menu</span>
    </button>
    <div class="relative hidden sm:block">
      <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">search</span>
      <input 
        type="text" 
        placeholder="Search" 
        class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 w-64 transition-all">
    </div>
  </div>
  
  <div class="flex items-center gap-3">
    <button class="p-2 hover:bg-gray-100 rounded-lg text-gray-600 relative transition-colors">
      <span class="material-icons">notifications</span>
      @if (user.notifications > 0) {
        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
      }
    </button>
    <div class="flex items-center gap-3 pl-3 border-l border-gray-200">
      <img 
        [src]="user.avatar" 
        [alt]="user.name"
        class="w-9 h-9 rounded-full object-cover border-2 border-white shadow-sm">
      <div class="hidden md:block text-right">
        <p class="text-sm font-semibold text-gray-900">{{ user.name }}</p>
        <p class="text-xs text-gray-500">{{ user.role }}</p>
      </div>
    </div>
  </div>
</header>
