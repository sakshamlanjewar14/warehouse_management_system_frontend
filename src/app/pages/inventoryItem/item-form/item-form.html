<!-- space-y-6 → adds vertical spacing between children -->
<div class="space-y-6">  
    <!-- Page Header -->
    <div class="flex sm:flex-row sm:items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Create InventoryItem</h1>
            <p class="text-sm text-gray-500 mt-1">Create new inventoryitem</p>
        </div>
        <div class="flex items-center gap-3">
            <a routerLink="inventoryitems"
                class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors shadow-sm cursor-pointer">
                <span class="material-icons text-sm"></span>
                Back to item list
            </a>
        </div>
    </div>


    <!-- InventoryItem From -->
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="py-6 px-3">
            <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
                <!--Quantity-->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Item Quantity <span class="text-red-500">*</span>
                    </label>
                    <input formControlName="quantity" type="text" placeholder="e.g., 123"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                    @if (itemForm.get('quantity')?.touched && itemForm.get('quantity')?.invalid) {
                    <small class="error">Quantity must be at least 1 characters.</small>
                    }
                </div>

                <div class="flex gap-3 items-center mt-6">
                    <button type="submit" [disabled]="itemForm.invalid || isSubmitting()"
                        class="flex items-center gap-2 px-4 py-2 bg-green-600 
                        text-white rounded-lg text-sm font-medium hover:bg-green-700 
                        transition-colors shadow-sm cursor-pointer
                        disabled:bg-gray-400 disabled:text-gray-700 disabled:opacity-75 disabled:cursor-not-allowed">Save</button>
                    <button type="button" (click)="clearInventoryItemForm()"
                        class="flex items-center gap-2 px-4 py-2 bg-yellow-600 text-white rounded-lg text-sm font-medium hover:bg-yellow-700 transition-colors shadow-sm cursor-pointer">Clear</button>
                    <a routerLink="/items"
                        class="flex items-center gap-2 px-4 py-2 bg-orange-600 text-white rounded-lg text-sm font-medium hover:bg-orange-700 transition-colors shadow-sm cursor-pointer">Cancel</a>
                </div>

                @if (submitMessage()) {
                <div class="alert success mt-6">{{ submitMessage() }}</div>
                }
            </form>
        </div>
    </div>
</div>
